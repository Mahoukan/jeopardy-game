<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Host Jeopardy</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#101728" />
  </head>
  <body>
    <main>
      <section id="loginSection" class="card">
        <h1>Admin Login</h1>
        <input
          id="adminPasswordInput"
          type="password"
          placeholder="Admin password" />
        <button id="adminLoginBtn">Login</button>
        <p id="adminLoginMessage"></p>
      </section>
      <div id="adminPanel" class="hidden">
        <section class="card">
          <h1>Host Jeopardy</h1>

          <input id="boardNameInput" placeholder="Board name" />
          <button id="createGameBtn">Start Selected Game</button>

          <button id="importJsonBtn">Import JSON Board</button>
          <input
            id="jsonImportInput"
            type="file"
            accept=".json"
            class="hidden" />

          <h2 id="gameCodeText">No game created yet</h2>
          <p>Share this code with your players.</p>
        </section>
        <input id="rejoinCodeInput" placeholder="Existing game code" />
        <button id="rejoinGameBtn">Rejoin Existing Game</button>
        <button id="restoreGameBtn">Restore Last Game</button>

        <section class="editor-card">
          <h2>Saved Boards</h2>
          <div id="savedBoards"></div>
        </section>

        <section class="layout">
          <section>
            <h2>Live Board</h2>
            <div id="board" class="board"></div>
          </section>

          <section class="side-panel">
            <h2>Players</h2>
            <div id="players"></div>

            <h2>Current Question</h2>
            <div id="questionBox" class="question-box">
              No question selected.
            </div>

            <div class="host-buttons">
              <div class="host-control-group">
                <h3>Question Control</h3>
                <button id="correctBtn">Correct</button>
                <button id="wrongBtn">Wrong</button>
                <button id="skipBtn">Skip</button>
              </div>

              <div class="host-control-group">
                <h3>Round Control</h3>
                <button id="startDoubleBtn">Start Double Jeopardy</button>
                <button id="startFinalBtn">Start Final Jeopardy</button>
                <button id="revealFinalBtn">Reveal Final Clue</button>
              </div>

              <div class="host-control-group">
                <h3>Daily Double</h3>
                <input
                  id="dailyDoubleWagerInput"
                  type="number"
                  placeholder="Daily Double wager" />
                <button id="setDailyDoubleWagerBtn">
                  Set Daily Double Wager
                </button>
              </div>
            </div>
          </section>
        </section>
      </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="host.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
      }
    </script>
  </body>
</html>
